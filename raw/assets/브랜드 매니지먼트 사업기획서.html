<h2 id="business-one-pager">BUSINESS ONE-PAGER</h2>
<p>이 문서는 극초반 기획 단계의 사업 개요 및 운영 조건 확정 내용을 통합한 초안입니다.</p>
<h3 id="%ED%95%9C-%EC%A4%84-%EC%A0%95%EC%9D%98">한 줄 정의</h3>
<p>5060 전문가의 경력을 브랜드·강의·제안 자산으로 번역해 실제 무대와 수익 기회로 연결하는 프리미엄 매니지먼트 서비스</p>
<h3 id="%ED%83%80%EA%B9%83-%EA%B3%A0%EA%B0%9D">타깃 고객</h3>
<p>50~60대 대표·임원·전문가·창업가 (동일 분야 경력 10~20년 이상)</p>
<h3 id="%ED%95%B5%EC%8B%AC-%EB%AC%B8%EC%A0%9C">핵심 문제</h3>
<p>경력은 충분하지만, 시장이 알아듣는 브랜드 언어와 자산 구조가 없음</p>
<h3 id="%EC%86%94%EB%A3%A8%EC%85%98">솔루션</h3>
<p>42문항 코칭 IP → 브랜드 자산 일괄 제작 → 강의·제안 구조화 → 시장 진입 매니지먼트</p>
<h3 id="%ED%99%95%EC%A0%95-bm">확정 BM</h3>
<p>프리미엄 1:1 매니지먼트 패키지 (우선 시작)<br />
→ 이후 그룹 코호트 / 디지털 진단형으로 단계적 확장</p>
<h3 id="%EC%99%B8%EC%A3%BC-%EC%9B%90%EA%B0%80">외주 원가</h3>
<p>브랜드 에셋 12종 외주 350만원 (고정) / 패키지별 순마진 아래 9장 참조</p>
<h3 id="%ED%95%B5%EC%8B%AC-ip">핵심 IP</h3>
<p>나다운 브랜딩 5060 코칭 가이드 42문항 (5영역·168개 패턴 코칭·42개 프로필 연결)</p>
<h3 id="ai-%EA%B0%9C%EB%B0%9C">AI 개발</h3>
<p>42문항 사전 진단 툴 / 마스터 브리프 자동 생성 / 브랜드 언어 생성기 (바이브코딩 개발 예정)</p>
<h3 id="%EA%B2%BD%EC%9F%81-%EC%9A%B0%EC%9C%84">경쟁 우위</h3>
<ol>
<li>질문-해석-변환 프레임워크(복제 불가 IP)</li>
<li>기획→제작→실행 일괄 구조</li>
<li>운영자 자체가 29년 증거 자산</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3">
<h1 id="1-%EC%82%AC%EC%97%85-%EC%A0%95%EC%9D%98-%EB%B0%8F-%ED%95%B5%EC%8B%AC-%EA%B0%80%EC%B9%98-%EC%A0%9C%EC%95%88">1. 사업 정의 및 핵심 가치 제안</h1>
<h2 id="%EC%9D%B4-%EC%82%AC%EC%97%85%EC%9D%98-%EB%B3%B8%EC%A7%88%EC%9D%80-%EB%B8%8C%EB%9E%9C%EB%94%A9%EB%B3%B4%EB%8B%A4-%EB%B2%88%EC%97%AD%EC%9E%85%EB%8B%88%EB%8B%A4">이 사업의 본질은 &quot;브랜딩&quot;보다 &quot;번역&quot;입니다</h2>
<p>고객은 예쁘게 꾸며지는 것을 원하지 않습니다.<br />
이미 축적된 시간이 시장에서 통하는 언어로 정리되길 원합니다.</p>
<p>이 사업의 경쟁력은 결과물(강의안, 제안서)이 아니라 해석 체계 — 즉 **&quot;질문→해석→변환 프레임워크&quot;**입니다.</p>
<h2 id="1-1-%ED%95%9C-%EC%A4%84-%EC%82%AC%EC%97%85-%EC%A0%95%EC%9D%98-%EB%B2%84%EC%A0%84-3%EC%A2%85">1-1. 한 줄 사업 정의 (버전 3종)</h2>
<h3 id="%EB%B2%84%EC%A0%84-a">버전 A</h3>
<p>5060 전문가의 경력을 브랜드·강의·제안 자산으로 번역해 시장 무대로 연결하는 프리미엄 매니지먼트 서비스</p>
<h3 id="%EB%B2%84%EC%A0%84-b">버전 B</h3>
<p>직함 뒤에 숨어 있던 경험의 가치를, 소개되고 제안되고 선택받는 브랜드 언어로 바꾸는 8주 집중 서비스</p>
<h3 id="%EB%B2%84%EC%A0%84-c">버전 C</h3>
<p>축적된 경력을 다음 기회로 연결하기 위해 정체성부터 강의안·제안서까지 통합 설계하는 브랜드 매니지먼트</p>
<h2 id="1-2-%ED%95%B5%EC%8B%AC-%EA%B0%80%EC%B9%98-%EC%A0%9C%EC%95%88-value-proposition">1-2. 핵심 가치 제안 (Value Proposition)</h2>
<p>고객이 얻는 최종 상태:<br />
<strong>&quot;경력은 많은데 정리가 안 된 상태&quot; → &quot;누가 봐도 소개 가능하고 제안 가능한 상태&quot;</strong></p>
<table>
<thead>
<tr>
<th>입력 (Input)</th>
<th>엔진 (Engine)</th>
<th>출력 (Output)</th>
</tr>
</thead>
<tbody>
<tr>
<td>경력·관점·가치관 / 전문성·타깃·네트워크</td>
<td>42문항 코칭 IP 기반 / 인터뷰 및 해석 체계</td>
<td>브랜드 프로필·메시지 구조 / 시각 자산·강의안·제안서·실행 가이드</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4">
<h1 id="2-%ED%95%B4%EA%B2%B0%ED%95%98%EB%8A%94-%EB%AC%B8%EC%A0%9C-3%EA%B0%9C-%EC%B8%B5%EC%9C%84">2. 해결하는 문제 (3개 층위)</h1>
<table>
<thead>
<tr>
<th>층위</th>
<th>문제 내용</th>
<th>브랜딩 함의</th>
</tr>
</thead>
<tbody>
<tr>
<td>Layer 1</td>
<td>경력 언어화 실패</td>
<td>&quot;나는 이걸 해왔다&quot;는 서술과 &quot;당신에게 이런 가치를 드린다&quot;는 메시지는 완전히 다른 작업이다. 직함 중심 자기소개에 익숙한 5060은 직함을 벗긴 뒤 남는 정체성 언어가 없다. 자산 발굴·언어화가 서비스의 진입 포인트</td>
</tr>
<tr>
<td>Layer 2</td>
<td>자산 분산 문제</td>
<td>프로필·제안서·강의안·SNS가 각각 따로 만들어져 말의 결이 다르다. 브랜드 일관성이 약해 신뢰 형성이 느리다. 하나의 마스터 브리프에서 모든 자산이 파생되는 구조</td>
</tr>
<tr>
<td>Layer 3</td>
<td>실행 진입 장벽</td>
<td>시간 부족·완벽주의·체면 장벽이 실행을 막는다. 5060은 &quot;빠른 MVP 실험&quot;보다 &quot;한 번에 제대로&quot;가 맞는 접근이다. PM형 일괄 대행 매니지먼트 구조의 수요 근거</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5">
<h1 id="3-%ED%83%80%EA%B9%83-%EA%B3%A0%EA%B0%9D">3. 타깃 고객</h1>
<h2 id="3-1-1%EC%B0%A8-%ED%95%B5%EC%8B%AC-%ED%83%80%EA%B9%83">3-1. 1차 핵심 타깃</h2>
<ul>
<li><strong>세대·직업</strong>: 50~60대 대표·임원·전문가·창업가</li>
<li><strong>경력 조건</strong>: 동일 또는 인접 분야 10~20년 이상 실무 경력</li>
<li><strong>욕구 신호</strong>: &quot;이제는 내 이름으로 정리된 무대가 필요하다&quot;고 느끼는 사람</li>
<li><strong>확장 니즈</strong>: 강의·자문·컨설팅·코칭·콘텐츠·출판·대외 활동으로 확장을 원하는 사람</li>
</ul>
<h2 id="3-2-2%EC%B0%A8-%ED%99%95%EC%9E%A5-%ED%83%80%EA%B9%83">3-2. 2차 확장 타깃</h2>
<ul>
<li>퇴직·이직·독립 전환기 중장년</li>
<li>사내 전문가에서 외부 브랜드로 이동하려는 사람</li>
<li>기존 B2B 실무는 강하지만 개인 브랜드와 제안 자산이 약한 사람</li>
</ul>
<h2 id="3-3-%ED%95%B5%EC%8B%AC-%EA%B3%A0%EA%B0%9D-%EC%9D%B8%EC%82%AC%EC%9D%B4%ED%8A%B8">3-3. 핵심 고객 인사이트</h2>
<p>이들은 정보가 부족한 사람이 아닙니다.</p>
<p>자기 경험을 구조화해줄 외부 시선과 PM형 지원이 부족한 사람입니다.</p>
<p>단순 코칭보다, **&quot;질문–해석–정리–제작–적용&quot;**이 묶인 하이브리드 방식에 더 높은 가치를 느낍니다.</p>
<p>자기 서사·핵심 가치·방법론·타깃·메시지·채널이 하나의 프로필 체계로 연결되는 경험이 중요합니다.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6">

<h1 id="6-%ED%8C%A8%ED%82%A4%EC%A7%80-%EC%A0%84%EB%9E%B5">6. 패키지 전략</h1>
<h2 id="bm-%ED%99%95%EC%A0%95-%ED%94%84%EB%A6%AC%EB%AF%B8%EC%97%84-11-%EB%A7%A4%EB%8B%88%EC%A7%80%EB%A8%BC%ED%8A%B8%EB%A1%9C-%EC%8B%9C%EC%9E%91">BM 확정: 프리미엄 1:1 매니지먼트로 시작</h2>
<p>이유: 이 서비스는 질문의 깊이·해석의 정밀도·결과물 통합력이 핵심이라 초기에는 1:1 고가형이 가장 적합.</p>
<p>패키지·기간·산출물 구조가 이미 확정되어 있어 MVP로 즉시 검증 가능.</p>

<h2 id="6-1-option-3-%EB%B8%8C%EB%9E%9C%EB%93%9C-%EB%A7%A4%EB%8B%88%EC%A7%80%EB%A8%BC%ED%8A%B8-%EB%A6%AC%ED%85%8C%EC%9D%B4%EB%84%88-%ED%9B%84%EC%86%8D-%EC%83%81%ED%92%88">6-1. Option 3: 브랜드 매니지먼트 리테이너 (후속 상품)</h2>
<p>월 단위 후속 운영 리테이너 — Option A/B 완료 고객 대상 업셀 상품</p>

<h1 id="8-ai-%EA%B0%9C%EB%B0%9C-%EB%A1%9C%EB%93%9C%EB%A7%B5-%EB%B0%94%EC%9D%B4%EB%B8%8C%EC%BD%94%EB%94%A9">8. AI 개발 로드맵 (바이브코딩)</h1>
<p>현재 서비스 워크플로우에서 반복적·패턴화·문서화 가능한 파트를 AI로 개발하면,<br />
<strong>운영자 시간 절감 + 확장성 확보 + 고객 경험 강화</strong> 세 가지를 동시에 달성할 수 있습니다.</p>
<h2 id="8-1-%EA%B0%9C%EB%B0%9C-%EC%9A%B0%EC%84%A0%EC%88%9C%EC%9C%84-%EB%B0%8F-%EC%9E%84%ED%8C%A9%ED%8A%B8-%EB%B6%84%EC%84%9D">8-1. 개발 우선순위 및 임팩트 분석</h2>

<thead>
<tr>
<th>우선순위</th>
<th>개발 항목</th>
<th>기능 요약</th>
<th>사업 임팩트</th>
<th>개발 난이도</th>

<tr>

<td>무료 리드 생성 + 유료 진입 상품 (3~5만원 진단 상품 가능)</td>
<td>낮음 (Claude API + 웹 UI)</td>
</tr>
<tr>
<td>★★★ 즉시</td>
<td>② 마스터 브리프 자동 생성기</td>

<td>운영자 시간 4~8시간 절약/건 / 확장성 핵심 도구</td>
<td>중간 (Claude API + 프롬프트 설계)</td>
</tr>

<td>★★☆ 단기</td>
<td>③ 브랜드 언어 생성기</td>
<td>마스터 브리프 입력 → 브랜드 원라이너 3종 / 매니페스토 초안 / 핵심 카피 초안 자동 생성 / 운영자가 선택·수정</td>
<td>고객 WOW 경험 포인트 (실시간 확인 가능)</td>
<td>낮음 (Claude API)</td>
</tr>
<tr>
<td>★★☆ 단기</td>
<td>④ 강의안 구조 자동화기</td>

<td>강의안 제작 시간 50% 이상 절감</td>
<td>중간 (Claude API + Slides 연동)</td>
</tr>
<tr>
<td>★★☆ 단기</td>
<td>⑤ B2B 제안서 자동화기</td>
<td>브리프 + 강의 주제 입력 → B2B 제안서 초안 자동 생성 (강의 개요·대상·커리큘럼·강사 프로필)</td>
<td>Option B 제작 시간 단축</td>
<td>중간 (Claude API + DOCX/PDF)</td>
</tr>
<tr>
<td>★☆☆ 중기</td>

<td>운영 효율화 / 다건 동시 관리 가능</td>
<td>낮음 (Notion 연동 or 웹 앱)</td>
</tr>
<tr>

<td>⑦ 진단→업셀 자동화 퍼널</td>

<h2 id="8-3-ai-%EA%B0%9C%EB%B0%9C-%EC%A0%81%EC%9A%A9-%EC%A0%9C%EC%99%B8-%EC%98%81%EC%97%AD-%EC%9D%B8%EA%B0%84%EC%9D%B4-%ED%95%B4%EC%95%BC-%ED%95%A0-%EA%B2%83">8-3. AI 개발 적용 제외 영역 (인간이 해야 할 것)</h2>
<h3 id="ai%EB%A1%9C-%EB%8C%80%EC%B2%B4%ED%95%A0-%EC%88%98-%EC%97%86%EB%8A%94-%ED%95%B5%EC%8B%AC-%EC%97%AD%ED%95%A0">AI로 대체할 수 없는 핵심 역할</h3>
<ul>
<li>
<p><strong>42문항 코칭 인터뷰 진행 자체</strong><br />
답변 패턴을 읽고 더 깊은 질문으로 유도하는 것은 경험 기반 코치의 고유 역할입니다.</p>
</li>
<li>
<p><strong>브리프 기반 최종 메시지 선택 및 편집</strong><br />
AI가 초안을 생성하더라도, 고객과의 맥락·뉘앙스를 살려 최종 확정하는 것은 운영자의 판단입니다.</p>
</li>
<li>
<p><strong>고객과의 신뢰 형성 및 정서적 안전감 제공</strong><br />
5060 고객은 &quot;내 이야기를 제대로 들어주는 사람&quot;에게 프리미엄을 지불합니다. AI는 여기를 대체하지 않습니다.</p>
</li>
</ul>
</section>
